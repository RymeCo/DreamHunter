<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DreamHunter | Ryme</title>
    <link rel="icon" type="image/png" href="assets/icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00e5ff;
            --primary-glow: rgba(0, 229, 255, 0.4);
            --bg: #030303;
            --surface: #0a0a0a;
            --text: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.6);
            --accent: #ff0055;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 50% 0%, rgba(0, 229, 255, 0.05) 0%, transparent 50%),
                url('assets/bg.png');
            background-size: cover;
            background-attachment: fixed;
            color: var(--text);
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 24px;
            width: 100%;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        /* --- NAVIGATION --- */
        nav {
            padding: 40px 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }

        .brand img {
            height: 40px;
            width: auto;
            filter: drop-shadow(0 0 10px var(--primary-glow));
        }

        .brand-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: 2px;
            color: var(--text);
            text-transform: uppercase;
        }

        /* --- HERO SECTION --- */
        .hero {
            text-align: center;
            padding-bottom: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
        }

        .hero h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(2.5rem, 10vw, 4.5rem);
            font-weight: 900;
            letter-spacing: -1px;
            margin-bottom: 12px;
            background: linear-gradient(to bottom, #fff 40%, #00e5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        .hero p {
            max-width: 500px;
            color: var(--text-dim);
            font-size: 1rem;
            margin-bottom: 32px;
            font-weight: 300;
            letter-spacing: 0.5px;
        }

        /* --- DOWNLOAD BUTTONS --- */
        .download-group {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
        }

        .btn {
            padding: 16px 32px;
            border-radius: 4px;
            text-decoration: none;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.03);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 240px;
        }

        .btn-primary {
            background: var(--text);
            color: #000;
            border: none;
        }

        .btn:hover {
            transform: translateY(-2px);
            border-color: var(--primary);
            box-shadow: 0 10px 20px rgba(0,0,0,0.4), 0 0 15px var(--primary-glow);
        }

        .btn-primary:hover {
            background: var(--primary);
            box-shadow: 0 10px 20px rgba(0,0,0,0.4), 0 0 20px var(--primary-glow);
        }

        .btn span {
            font-family: 'Inter', sans-serif;
            font-size: 0.65rem;
            opacity: 0.5;
            font-weight: 400;
            margin-top: 4px;
            letter-spacing: 0;
        }

        /* --- SLIDER AT BOTTOM --- */
        .slider-section {
            padding: 40px 0;
            width: 100%;
        }

        .slider-wrapper {
            width: 100%;
            height: 240px;
            position: relative;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .slider {
            display: flex;
            width: 400%;
            height: 100%;
            transition: transform 1s cubic-bezier(0.85, 0, 0.15, 1);
        }

        .slide {
            width: 25%;
            height: 100%;
            background-size: cover;
            background-position: center;
            filter: grayscale(0.2) contrast(1.1);
            transition: filter 0.5s ease;
        }

        .slide:hover {
            filter: grayscale(0) contrast(1.2);
        }

        /* --- FOOTER --- */
        footer {
            padding: 40px 0;
            text-align: center;
            color: var(--text-dim);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-family: 'Orbitron', sans-serif;
        }

        footer span {
            color: var(--primary);
        }

        /* --- ANIMATION --- */
        @keyframes slide {
            0%, 20% { transform: translateX(0); }
            25%, 45% { transform: translateX(-25%); }
            50%, 70% { transform: translateX(-50%); }
            75%, 95% { transform: translateX(-75%); }
            100% { transform: translateX(0); }
        }

        .slider { animation: slide 20s infinite; }

        @media (max-height: 800px) {
            .hero { padding-top: 20px; }
            .slider-wrapper { height: 180px; }
        }

    </style>
</head>
<body>

    <div class="container">
        <nav>
            <a href="#" class="brand">
                <img src="assets/icon.png" alt="DreamHunter Icon">
                <div class="brand-text">Ryme</div>
            </a>
        </nav>

        <section class="hero">
            <h1>DreamHunter</h1>
            <p>Survival is a choice. Mastery is a journey. Explore the high-stakes world of DreamHunter.</p>

            <div class="download-group">
                <a href="https://github.com/RymeCo/DreamHunter/releases/download/v1.0.0/DreamHunter_v1.0.apk" class="btn btn-primary">
                    Play Now
                    <span>v1.0.0 (66MB) • Android</span>
                </a>
                <a href="https://github.com/RymeCo/DreamHunter/releases/download/v1.0.0/DreamHunter_Admin_v1.0.apk" class="btn">
                    Admin Portal
                    <span>v1.0.0 (53MB) • Android</span>
                </a>
            </div>
        </section>

        <section class="slider-section">
            <div class="slider-wrapper">
                <div class="slider">
                    <div class="slide" style="background-image: url('assets/screenshot_1.png')"></div>
                    <div class="slide" style="background-image: url('assets/preview.png')"></div>
                    <div class="slide" style="background-image: url('assets/screenshot1.png')"></div>
                    <div class="slide" style="background-image: url('assets/screenshot.png')"></div>
                </div>
            </div>
        </section>

        <footer>
            Built by <span>Ryme</span> &copy; 2026
        </footer>
    </div>

</body>
</html>
