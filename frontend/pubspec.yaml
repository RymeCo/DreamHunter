name: dreamhunter
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flame: ^1.36.0
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^4.4.0
  cloud_firestore: ^6.1.2
  http: ^1.6.0
  flame_tiled: ^3.1.0
  firebase_auth: ^6.1.4
  audioplayers: ^6.5.1
  google_fonts: ^8.0.2
  shared_preferences: ^2.5.4
  connectivity_plus: ^7.0.0
  crypto: ^3.0.7
  intl: ^0.20.2
  web_socket_channel: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.4
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/icon.png"
  min_sdk_android: 21 # android >= 5.0
  adaptive_icon_background: "#141645" # User provided brand color to fix edges
  adaptive_icon_foreground: "assets/icon.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true

  assets:
    - assets/audio/
    - assets/images/
    - assets/images/dashboard/
    - assets/images/dashboard/auth/
    - assets/images/dashboard/core/
    - assets/images/game/
    - assets/images/game/characters/
    - assets/images/game/monsters/
    - assets/images/game/economy/
    - assets/images/game/defenses/
    - assets/images/game/interface/
    - assets/images/tiles/
    - assets/tiles/


